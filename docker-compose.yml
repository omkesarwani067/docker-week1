version: '3.9'

networks:
  platform-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:

services:

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth-service
      - product-service
      - order-service
    networks:
      - platform-net
    restart: unless-stopped

  auth-service:
    build:
      context: ./auth-service
      target: production
    environment:
      - NODE_ENV=production
      - PORT=3001
    networks:
      - platform-net
    restart: unless-stopped

  product-service:
    build:
      context: ./product-service
      target: production
    environment:
      - NODE_ENV=production
      - PORT=3002
    networks:
      - platform-net
    restart: unless-stopped

  order-service:
    build:
      context: ./order-service
      target: production
    environment:
      - NODE_ENV=production
      - PORT=3003
    networks:
      - platform-net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    networks:
      - platform-net
    restart: unless-stopped
    command: redis-server --appendonly yes

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: observability
      POSTGRES_USER: platform
      POSTGRES_PASSWORD: platform_secret
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - platform-net
    restart: unless-stopped
