
networks:
  platform-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:

services:

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth-service
      - product-service
      - order-service
    networks:
      - platform-net
    restart: unless-stopped

  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    environment:
      - NODE_ENV=production
      - PORT=3001
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    networks:
      - platform-net
    restart: unless-stopped

  product-service:
    build:
      context: .
      dockerfile: product-service/Dockerfile
    environment:
      - NODE_ENV=production
      - PORT=3002
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    networks:
      - platform-net
    restart: unless-stopped

  order-service:
    build:
      context: .
      dockerfile: order-service/Dockerfile
    environment:
      - NODE_ENV=production
      - PORT=3003
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    networks:
      - platform-net
    restart: unless-stopped

  log-processor:
    build:
      context: ./log-processor
      target: production
    environment:
      - REDIS_URL=redis://redis:6379
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=observability
      - POSTGRES_USER=platform
      - POSTGRES_PASSWORD=platform_secret
    depends_on:
      - redis
      - postgres
    networks:
      - platform-net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    networks:
      - platform-net
    restart: unless-stopped
    command: redis-server --appendonly yes

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: observability
      POSTGRES_USER: platform
      POSTGRES_PASSWORD: platform_secret
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - platform-net
    restart: unless-stopped
